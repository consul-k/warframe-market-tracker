version: "3.9"

services:
  web:
    image: consulk/warframe-market-tracker:latest
    restart: always
    env_file:
      - .env
    volumes:
      - static_volume:/static
      - db_data:/app/warframe_market_tracker

  watcher:
    image: consulk/warframe-market-tracker:latest
    restart: always
    env_file:
      - .env
    command: ["python", "/app/price_watcher.py"]
    depends_on:
      - web
    volumes:
      - db_data:/app/warframe_market_tracker

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - static_volume:/static
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  static_volume:
  db_data: